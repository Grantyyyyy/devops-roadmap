services:
  app:
    image: devops-roadmap-app:staging
    container_name: staging_laravel_app
    environment:
      APP_ENV: staging
      APP_DEBUG: false
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_staging
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: cache
    depends_on:
      - db
      - cache

  web:
    image: nginx:alpine
    container_name: staging_laravel_web
    ports:
      - "8100:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: staging_laravel_db
    environment:
      MYSQL_DATABASE: laravel_staging
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - staging_db_data:/var/lib/mysql

  cache:
    image: redis:7-alpine
    container_name: staging_laravel_cache

  frontend:
    image: devops-roadmap-frontend:staging
    container_name: staging_react_frontend
    ports:
      - "3100:80"

volumes:
  staging_db_data:
